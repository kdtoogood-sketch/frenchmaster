<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="French Master"/>
<title>French Master 🇫🇷</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇫🇷</text></svg>"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf6f0;font-family:Arial,sans-serif;color:#1a1a2e}
h1,h2,h3{font-family:Georgia,serif}
button{cursor:pointer;font-family:Arial,sans-serif}
textarea,input{font-family:Arial,sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}

/* Layout */
#root{min-height:100vh}
.header{background:#1a1a2e;padding:13px 20px;display:flex;align-items:center;justify-content:space-between}
.header-title{font-family:Georgia;color:#f5e6c8;font-size:17px;font-weight:bold}
.header-sub{color:#c9a96e;font-size:10px;letter-spacing:2px;text-transform:uppercase}
.wrap{max-width:680px;margin:0 auto;padding:24px 16px}
.center{text-align:center}
.big-emoji{font-size:44px;margin-bottom:10px;display:block}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.g1{display:grid;gap:12px;margin-bottom:18px}

/* Cards */
.card{background:#fff;border:2px solid #ede8df;border-radius:12px;padding:18px;cursor:pointer}
.card:hover{border-color:#c9a96e;transform:translateY(-2px);transition:all .2s}
.card-row{display:flex;align-items:center;gap:12px}

/* Buttons */
.btn{background:#1a1a2e;color:#f5e6c8;border:none;padding:11px 22px;border-radius:6px;font-size:13px;font-weight:bold;letter-spacing:1px}
.btn-g{background:#2e9e7a;color:#fff;border:none;padding:11px 22px;border-radius:6px;font-size:13px;font-weight:bold}
.btn-o{background:transparent;color:#1a1a2e;border:2px solid #1a1a2e;padding:9px 20px;border-radius:6px;font-size:13px;font-weight:bold}
.btn-r{background:transparent;color:#e74c6f;border:2px solid #e74c6f;padding:9px 20px;border-radius:6px;font-size:13px;font-weight:bold}
.btn:disabled,.btn-g:disabled{background:#ccc;color:#999;cursor:not-allowed}

/* Inputs */
.inp{border:2px solid #ede8df;border-radius:8px;padding:10px 14px;font-size:14px;outline:none;background:#faf6f0;width:100%}
.inp:focus{border-color:#c9a96e}
.ta{border:2px solid #ede8df;border-radius:8px;padding:14px;font-size:14px;outline:none;background:#faf6f0;resize:vertical;width:100%}
.ta:focus{border-color:#c9a96e}

/* Info boxes */
.box-info{background:#fff8ef;border:1px solid #f0d9a8;border-radius:8px;padding:12px 16px;color:#6b4f1a;line-height:1.6;margin-bottom:14px;font-size:13px}
.box-good{background:#f0faf5;border:1px solid #b8e6d0;border-radius:8px;padding:12px 16px;color:#2c5a42;margin-bottom:14px;font-size:13px}
.box-purple{background:#f5f0ff;border:1px solid #d4c5f0;border-radius:8px;padding:12px 16px;color:#4a3480;margin-bottom:14px;font-size:13px}

/* Sub-text */
.sub{color:#888;font-size:14px;line-height:1.6;margin-bottom:20px}
.label{font-size:11px;color:#c9a96e;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}

/* Chat */
.chat-area{padding:16px;display:flex;flex-direction:column;gap:12px;min-height:260px;max-height:52vh;overflow-y:auto}
.bubble-sophie{display:flex;align-items:flex-start;gap:8px}
.bubble-user{display:flex;justify-content:flex-end}
.avatar{width:30px;height:30px;border-radius:50%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-sophie{background:#fff;border:1px solid #ede8df;border-radius:16px 16px 16px 4px;padding:10px 14px;font-size:14px;line-height:1.7;max-width:70%}
.msg-user{background:#1a1a2e;color:#f5e6c8;border-radius:16px 16px 4px 16px;padding:10px 14px;font-size:14px;line-height:1.7;max-width:70%}
.sophie-name{font-size:10px;color:#c9a96e;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}

/* Progress */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.stat{text-align:center;background:#faf6f0;border-radius:8px;padding:10px 4px}
.stat-num{font-family:Georgia;font-size:26px;font-weight:bold}
.stat-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px}

/* Score */
.big-score{font-family:Georgia;font-size:56px;font-weight:bold;line-height:1}

/* Correction cards */
.correction{background:#fff;border:1px solid #ede8df;border-radius:10px;padding:14px;margin-bottom:10px}
.correction-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;margin-bottom:8px}
.c-wrong{background:#fff0f3;border:1px solid #ffd0da;border-radius:6px;padding:8px 10px}
.c-right{background:#f0fff6;border:1px solid #b8e6d0;border-radius:6px;padding:8px 10px}
.c-label{font-size:10px;text-transform:uppercase;margin-bottom:3px}
.c-text{font-size:13px;font-style:italic}
.tag{font-size:11px;color:#fff;padding:2px 8px;border-radius:20px;text-transform:uppercase}

/* Setup */
.setup-screen{min-height:100vh;background:#1a1a2e;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-box{background:#fff;border-radius:16px;padding:28px;max-width:420px;width:100%}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── FIREBASE ──────────────────────────────────────────────────
const FB_URL = "https://firestore.googleapis.com/v1/projects/propdesk-f50e0/databases/(default)/documents/frenchmaster/gurbani?key=AIzaSyBiBmFAJHTxoZAddAON94u7FQ_d-RpX2io";

async function fbLoad() {
  try {
    const r = await fetch(FB_URL);
    if (!r.ok) return null;
    const doc = await r.json();
    return JSON.parse(doc.fields?.data?.stringValue || "null");
  } catch { return null; }
}

async function fbSave(data) {
  try {
    await fetch(FB_URL + "&updateMask.fieldPaths=data", {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fields: { data: { stringValue: JSON.stringify(data) } } })
    });
  } catch(e) { console.error("Save error", e); }
}

function emptyProg() { return { sessions:[], streak:{current:0,longest:0,lastDate:""}, totalSessions:0 }; }

function addSession(prog, skill, score, topic) {
  const today = new Date().toISOString().split("T")[0];
  const yest  = new Date(Date.now()-86400000).toISOString().split("T")[0];
  const s = prog.streak||{current:0,longest:0,lastDate:""};
  let curr = s.current;
  if (s.lastDate !== today) curr = s.lastDate===yest ? s.current+1 : 1;
  const session = { id:Date.now(), date:today, skill, score, topic };
  const sessions = [session,...(prog.sessions||[])].slice(0,60);
  return { sessions, streak:{current:curr,longest:Math.max(s.longest||0,curr),lastDate:today}, totalSessions:(prog.totalSessions||0)+1 };
}

// ── GEMINI API ────────────────────────────────────────────────
async function callAI(systemPrompt, messages) {
  const key = state.apiKey;
  const contents = messages.map(m=>({ role:m.role==="assistant"?"model":"user", parts:[{text:m.content}] }));
  const body = { systemInstruction:{parts:[{text:systemPrompt}]}, contents, generationConfig:{maxOutputTokens:1024} };
  const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

async function callAIJson(systemPrompt, userMsg) {
  const raw = await callAI(systemPrompt, [{role:"user",content:userMsg}]);
  const s = Math.min(raw.indexOf("{")>=0?raw.indexOf("{"):9999, raw.indexOf("[")>=0?raw.indexOf("["):9999);
  const e = Math.max(raw.lastIndexOf("}"), raw.lastIndexOf("]"));
  return JSON.parse(raw.slice(s, e+1));
}

// ── TTS ───────────────────────────────────────────────────────
let ttsActive = false;
function ttsSpeak(text, onEnd) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel(); ttsActive = true;
  const u = new SpeechSynthesisUtterance(text);
  u.lang="fr-FR"; u.rate=0.85;
  const vs = speechSynthesis.getVoices();
  const fv = vs.find(v=>v.lang==="fr-FR")||vs.find(v=>v.lang.startsWith("fr"));
  if (fv) u.voice = fv;
  u.onend = ()=>{ ttsActive=false; onEnd?.(); };
  u.onerror = ()=>{ ttsActive=false; };
  speechSynthesis.speak(u);
}
function ttsStop() { speechSynthesis?.cancel(); ttsActive=false; }

// ── STT ───────────────────────────────────────────────────────
let sttRec = null;
const sttOk = !!(window.SpeechRecognition||window.webkitSpeechRecognition);
function sttStart(onResult) {
  if (!sttOk) return;
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  sttRec = new SR(); sttRec.lang="fr-FR"; sttRec.interimResults=false;
  sttRec.onresult = e=>{ onResult(e.results[0][0].transcript); };
  sttRec.start();
}
function sttStop() { sttRec?.stop(); }

// ── GLOBAL STATE ──────────────────────────────────────────────
const state = {
  apiKey: localStorage.getItem("fm_key")||"",
  screen: "home",   // home|setup|speaking|listening|reading|writing
  progress: null,

  // speaking
  spkTopic: null, spkMsgs: [], spkBusy: false, spkView: "topics", spkFb: null,

  // listening
  lisView: "sub",   // sub|ct|cl|cq|cr|dp|dt|dr
  lisPassage:"", lisQs:[], lisAns:{}, lisResult:null, lisSents:[], lisDIdx:0, lisDInput:"", lisDResults:[], lisBusy:false,

  // reading
  rdView: "topics", rdContent:null, rdAns:{}, rdResult:null, rdBusy:false,

  // writing
  wrView: "prompts", wrPrompt:null, wrText:"", wrFb:null, wrBusy:false,
};

// ── RENDER HELPERS ────────────────────────────────────────────
const $ = id => document.getElementById(id);
function scoreColor(s){ return s>=75?"#2e9e7a":s>=55?"#e6954a":"#e74c6f"; }

function render() {
  const root = $("root");
  root.innerHTML = "";
  if (!state.apiKey) { renderSetup(root); return; }
  renderHeader(root);
  const body = document.createElement("div");
  body.id = "body";
  root.appendChild(body);
  if (state.screen==="home")      renderHome(body);
  if (state.screen==="speaking")  renderSpeaking(body);
  if (state.screen==="listening") renderListening(body);
  if (state.screen==="reading")   renderReading(body);
  if (state.screen==="writing")   renderWriting(body);
}

function renderHeader(parent) {
  const h = document.createElement("div");
  h.className = "header";
  h.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:22px">🇫🇷</span>
      <div>
        <div class="header-title">French Master</div>
        <div class="header-sub">Gurbani Kaur · B1</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      ${state.progress?`<span style="background:#c9a96e;color:#1a1a2e;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:bold">🔥 ${state.progress.streak?.current||0}</span>`:""}
      ${state.screen!=="home"?`<button id="btn-home" style="background:transparent;color:#aaa;border:1px solid #444;padding:6px 12px;border-radius:4px;font-size:12px">← Home</button>`:""}
    </div>`;
  parent.appendChild(h);
  $("btn-home")?.addEventListener("click",()=>{ state.screen="home"; render(); });
}

// ── SETUP ─────────────────────────────────────────────────────
function renderSetup(parent) {
  parent.innerHTML = `
    <div class="setup-screen">
      <div class="setup-box">
        <div class="center" style="margin-bottom:20px">
          <div style="font-size:48px;margin-bottom:10px">🇫🇷</div>
          <h1 style="font-size:24px;margin-bottom:6px">French Master</h1>
          <p style="color:#888;font-size:14px">For Gurbani Kaur — one-time setup</p>
        </div>
        <div class="box-info">
          <strong>Get your free API key (2 min):</strong><br>
          1. Go to <strong>aistudio.google.com</strong><br>
          2. Click <strong>"Get API Key"</strong> → Create<br>
          3. Paste below — saved on this device
        </div>
        <input id="key-inp" class="inp" placeholder="AIzaSy…" style="margin-bottom:10px"/>
        <div id="key-err" style="color:#e74c6f;font-size:13px;margin-bottom:8px;display:none"></div>
        <button id="key-btn" class="btn" style="width:100%;padding:13px;font-size:15px">Start Learning 🚀</button>
      </div>
    </div>`;

  $("key-btn").addEventListener("click", () => {
    const k = $("key-inp").value.trim();
    if (!k || !k.startsWith("AIza")) {
      $("key-err").textContent = "Key should start with AIza… copy it exactly from Google AI Studio.";
      $("key-err").style.display = "block";
      return;
    }
    state.apiKey = k;
    localStorage.setItem("fm_key", k);
    state.screen = "home";
    render();
  });
}

// ── HOME ──────────────────────────────────────────────────────
function renderHome(parent) {
  const p = state.progress;
  const skillAvg = skill => {
    if (!p?.sessions?.length) return null;
    const ss = p.sessions.filter(s=>s.skill===skill).slice(0,10);
    return ss.length ? Math.round(ss.reduce((a,s)=>a+s.score,0)/ss.length) : null;
  };

  const skillCards = [
    {id:"speaking", e:"🎤",l:"Speaking", d:"Voice conversation with Sophie",c:"#e74c6f"},
    {id:"listening",e:"👂",l:"Listening",d:"Comprehension & dictation",     c:"#2e9e7a"},
    {id:"reading",  e:"📖",l:"Reading",  d:"Read B1 passages & answer Qs",  c:"#7c5cbf"},
    {id:"writing",  e:"✍️",l:"Writing",  d:"Write in French, get corrections",c:"#c9a96e"},
  ];

  const wrap = document.createElement("div");
  wrap.className = "wrap";

  // Welcome
  wrap.innerHTML = `
    <div class="center" style="margin-bottom:24px">
      <div class="label" style="display:block;text-align:center">Bienvenue 🌸</div>
      <h1 style="font-size:28px;margin-bottom:8px">Bonjour, Gurbani Kaur!</h1>
      <p class="sub">Your personal French B1 practice app — all four skills, all progress saved.</p>
    </div>
  `;

  // Progress panel
  if (p) {
    const avgScore = p.sessions?.length ? Math.round(p.sessions.slice(0,5).reduce((a,s)=>a+s.score,0)/Math.min(p.sessions.length,5)) : null;
    const progDiv = document.createElement("div");
    progDiv.style.cssText="background:#fff;border:2px solid #ede8df;border-radius:12px;padding:16px;margin-bottom:20px";
    progDiv.innerHTML=`
      <div class="stat-grid">
        <div class="stat"><div class="stat-num" style="color:#c9a96e">${p.streak?.current||0}</div><div class="stat-lbl">Streak 🔥</div></div>
        <div class="stat"><div class="stat-num">${p.totalSessions||0}</div><div class="stat-lbl">Sessions</div></div>
        <div class="stat"><div class="stat-num">${p.streak?.longest||0}</div><div class="stat-lbl">Best Streak</div></div>
        <div class="stat"><div class="stat-num" style="color:#2e9e7a">${avgScore||"—"}</div><div class="stat-lbl">Avg Score</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:${p.sessions?.length?"12px":"0"}">
        ${[{id:"speaking",e:"🎤",c:"#e74c6f"},{id:"listening",e:"👂",c:"#2e9e7a"},{id:"reading",e:"📖",c:"#7c5cbf"},{id:"writing",e:"✍️",c:"#c9a96e"}].map(sk=>`
          <div style="text-align:center;background:#faf6f0;border-radius:8px;padding:8px 4px">
            <div style="font-size:18px;margin-bottom:2px">${sk.e}</div>
            <div style="font-family:Georgia;font-size:16px;font-weight:bold;color:${skillAvg(sk.id)?sk.c:"#ccc"}">${skillAvg(sk.id)||"—"}</div>
            <div style="font-size:10px;color:#aaa">avg</div>
          </div>`).join("")}
      </div>
      ${p.sessions?.length?`
        <div style="border-top:1px solid #ede8df;padding-top:12px">
          <div style="font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Recent Sessions</div>
          ${p.sessions.slice(0,4).map(s=>`
            <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px">
              <span style="color:#666">${s.date} · ${s.skill} · ${s.topic||""}</span>
              <span style="font-weight:bold;color:${scoreColor(s.score)}">${s.score}</span>
            </div>`).join("")}
        </div>`:""}
    `;
    wrap.appendChild(progDiv);
  }

  // Skill cards
  const grid = document.createElement("div");
  grid.className = "g2";
  skillCards.forEach(c => {
    const avg = skillAvg(c.id);
    const card = document.createElement("div");
    card.style.cssText=`background:#fff;border:2px solid ${c.c};border-radius:14px;padding:20px;cursor:pointer`;
    card.innerHTML=`
      <div style="font-size:32px;margin-bottom:10px">${c.e}</div>
      <div style="font-family:Georgia;font-size:18px;font-weight:bold;margin-bottom:6px">${c.l}</div>
      <div style="font-size:13px;color:#888;line-height:1.5">${c.d}</div>
      ${avg?`<div style="margin-top:8px;font-size:12px;color:${c.c};font-weight:bold">Last avg: ${avg}</div>`:""}
    `;
    card.addEventListener("click", () => { state.screen = c.id; render(); });
    grid.appendChild(card);
  });
  wrap.appendChild(grid);

  // Footer
  const foot = document.createElement("div");
  foot.innerHTML=`
    <div class="box-purple">💡 B1 Level · Use <strong>Chrome</strong> for microphone · Progress syncs to Firebase across all devices</div>
    <div class="center"><button id="btn-change-key" style="background:none;border:none;color:#bbb;font-size:12px;cursor:pointer">⚙️ Change API Key</button></div>
  `;
  wrap.appendChild(foot);
  parent.appendChild(wrap);
  $("btn-change-key")?.addEventListener("click",()=>{ localStorage.removeItem("fm_key"); state.apiKey=""; render(); });
}

// ── FEEDBACK PANEL ────────────────────────────────────────────
function renderFeedback(parent, data, onRetry, onHome) {
  const wrap = document.createElement("div");
  wrap.style.cssText="max-width:660px;margin:0 auto;padding:24px 16px";
  const catColor = c=>({Grammar:"#e74c6f",Vocabulary:"#7c5cbf",Spelling:"#e6954a",Structure:"#2e9e7a","Word Order":"#2e9e7a"}[c]||"#888");
  wrap.innerHTML=`
    <div class="center" style="margin-bottom:18px">
      <div class="big-score" style="color:${scoreColor(data.score)}">${data.score}</div>
      <div style="font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-top:4px">out of 100</div>
      <p style="font-size:14px;color:#555;margin-top:10px;line-height:1.7">${data.overall}</p>
    </div>
    ${data.strengths?.length?`<div class="box-good"><div style="font-weight:bold;color:#2e9e7a;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">✓ What You Did Well</div>${data.strengths.map(x=>`<div style="margin-bottom:4px;padding-left:10px;border-left:2px solid #2e9e7a">${x}</div>`).join("")}</div>`:""}
    ${data.mistakes?.length?`
      <div style="margin-bottom:14px">
        <div style="font-size:12px;color:#e74c6f;letter-spacing:2px;text-transform:uppercase;font-weight:bold;margin-bottom:10px">✗ Corrections</div>
        ${data.mistakes.map(m=>`
          <div class="correction">
            <span class="tag" style="background:${catColor(m.category)}">${m.category}</span>
            <div class="correction-grid">
              <div class="c-wrong"><div class="c-label" style="color:#e74c6f">You wrote</div><div class="c-text" style="color:#c0392b">"${m.original}"</div></div>
              <div class="c-right"><div class="c-label" style="color:#2e9e7a">Correction</div><div class="c-text" style="color:#1a6640">"${m.correction}"</div></div>
            </div>
            <div style="font-size:13px;color:#666;line-height:1.6;border-top:1px solid #ede8df;padding-top:8px">${m.explanation}</div>
          </div>`).join("")}
      </div>`:""}
    ${data.suggestions?.length?`<div class="box-purple"><div style="font-size:12px;color:#7c5cbf;letter-spacing:2px;text-transform:uppercase;font-weight:bold;margin-bottom:8px">💡 Expressions to Learn</div>${data.suggestions.map(x=>`<div style="margin-bottom:4px;padding-left:10px;border-left:2px solid #7c5cbf">${x}</div>`).join("")}</div>`:""}
    ${data.nextFocus?`<div class="box-info"><strong>🎯 Focus next time:</strong> ${data.nextFocus}</div>`:""}
    <div style="display:flex;gap:12px;justify-content:center">
      <button id="fb-retry" class="btn">Try Again</button>
      <button id="fb-home" class="btn-o">← Home</button>
    </div>
  `;
  parent.appendChild(wrap);
  $("fb-retry").addEventListener("click", onRetry);
  $("fb-home").addEventListener("click", onHome);
}

// ── SPEAKING ──────────────────────────────────────────────────
const SPEAK_TOPICS=[
  {id:"voyage",l:"Voyage & Vacances",e:"✈️"},{id:"famille",l:"Famille & Amis",e:"👨‍👩‍👧"},
  {id:"cuisine",l:"Nourriture",e:"🥐"},{id:"travail",l:"Travail",e:"💼"},
  {id:"loisirs",l:"Loisirs & Hobbies",e:"🎨"},{id:"cinema",l:"Cinéma & Culture",e:"🎬"},
];
const SYS_SPK=`You are Sophie, a warm French tutor speaking with Gurbani, a B1-level learner. Always reply in French, 2–3 sentences. Be encouraging. Never correct mid-conversation. Ask follow-up questions.`;
const SYS_SPK_FB=`Review Gurbani's B1 French conversation. Analyse ONLY the LEARNER lines. Return ONLY valid JSON: {"overall":"...","score":72,"strengths":["..."],"mistakes":[{"original":"...","correction":"...","explanation":"...","category":"Grammar"}],"suggestions":["..."],"nextFocus":"..."}`;

function renderSpeaking(parent) {
  if (state.spkView==="topics") {
    const wrap=document.createElement("div"); wrap.className="wrap";
    wrap.innerHTML=`<div class="center" style="margin-bottom:20px"><span class="big-emoji">🎤</span><h2>Speaking Practice</h2><p class="sub">Choose a topic — Sophie speaks French, you reply by voice or typing</p>${!sttOk?`<div class="box-info">⚠️ Use Chrome for microphone. You can still type.</div>`:""}</div>`;
    const grid=document.createElement("div"); grid.className="g2";
    SPEAK_TOPICS.forEach(t=>{
      const c=document.createElement("div"); c.className="card card-row";
      c.innerHTML=`<span style="font-size:26px">${t.e}</span><div><div style="font-family:Georgia;font-size:14px;font-weight:bold">${t.l}</div><div style="font-size:11px;color:#888;margin-top:2px">Click to begin</div></div>`;
      c.addEventListener("click",()=>spkStart(t));
      grid.appendChild(c);
    });
    wrap.appendChild(grid); parent.appendChild(wrap);
    return;
  }

  if (state.spkView==="feedback") {
    if (state.spkBusy) { parent.innerHTML=`<div class="center" style="padding:60px 20px"><div style="font-size:36px;margin-bottom:12px">🔍</div><p style="font-family:Georgia;font-size:20px">Analysing Gurbani's French…</p></div>`; return; }
    if (state.spkFb) renderFeedback(parent, state.spkFb, ()=>{ state.spkView="topics"; state.spkMsgs=[]; state.spkFb=null; render(); }, ()=>{ state.screen="home"; render(); });
    return;
  }

  // Chat view
  const chatWrap = document.createElement("div");
  chatWrap.style.cssText="max-width:700px;margin:0 auto";
  const turns = state.spkMsgs.filter(m=>m.role==="user").length;
  chatWrap.innerHTML=`
    <div style="background:#fff;border-bottom:1px solid #ede8df;padding:10px 16px;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:13px;color:#666">${state.spkTopic?.e} ${state.spkTopic?.l} · <strong>${turns}</strong> turns</span>
      <button id="spk-end" class="btn-r" ${turns===0?"disabled":""}>End & Feedback</button>
    </div>
    <div id="chat-area" class="chat-area"></div>
    <div id="spk-banner" style="display:none;background:#fff8ef;padding:5px 16px;font-size:12px;color:#c9a96e;justify-content:space-between;align-items:center">
      🔊 Sophie is speaking… <button id="spk-stop" style="background:none;border:none;cursor:pointer;color:#888;font-size:12px">⏹ Stop</button>
    </div>
    <div style="background:#fff;border-top:1px solid #ede8df;padding:10px 14px;display:flex;gap:10px;align-items:center">
      ${sttOk?`<button id="spk-mic" style="width:42px;height:42px;border-radius:50%;background:#1a1a2e;color:#f5e6c8;border:none;font-size:18px;flex-shrink:0">🎤</button>`:""}
      <input id="spk-inp" class="inp" placeholder="${sttOk?"Or type in French…":"Type in French…"}"/>
      <button id="spk-send" class="btn" style="flex-shrink:0">Send</button>
    </div>
  `;
  parent.appendChild(chatWrap);
  spkRenderMsgs();
  $("spk-end").addEventListener("click", spkEnd);
  $("spk-send").addEventListener("click", ()=>spkSend($("spk-inp").value));
  $("spk-inp").addEventListener("keydown", e=>{ if(e.key==="Enter") spkSend($("spk-inp").value); });
  $("spk-stop")?.addEventListener("click", ()=>{ ttsStop(); $("spk-banner").style.display="none"; });
  if (sttOk) {
    let micOn=false;
    $("spk-mic").addEventListener("click",()=>{
      if (micOn) { sttStop(); $("spk-mic").style.background="#1a1a2e"; micOn=false; return; }
      micOn=true; $("spk-mic").style.background="#e74c6f";
      sttStart(t=>{ micOn=false; $("spk-mic").style.background="#1a1a2e"; spkSend(t); });
    });
  }
}

function spkRenderMsgs() {
  const area = $("chat-area"); if (!area) return;
  area.innerHTML="";
  state.spkMsgs.forEach(m=>{
    const div=document.createElement("div");
    if (m.role==="assistant") {
      div.className="bubble-sophie";
      div.innerHTML=`<div class="avatar">🇫🇷</div><div class="msg-sophie"><div class="sophie-name">Sophie</div>${m.content}</div>`;
    } else {
      div.className="bubble-user";
      div.innerHTML=`<div class="msg-user">${m.content}</div>`;
    }
    area.appendChild(div);
  });
  if (state.spkBusy) {
    const d=document.createElement("div"); d.className="bubble-sophie";
    d.innerHTML=`<div class="avatar">🇫🇷</div><div class="msg-sophie" style="color:#888">Sophie is typing…</div>`;
    area.appendChild(d);
  }
  area.scrollTop = area.scrollHeight;
}

async function spkStart(topic) {
  state.spkTopic=topic; state.spkView="chat"; state.spkMsgs=[]; state.spkBusy=true; render();
  try {
    const reply=await callAI(SYS_SPK,[{role:"user",content:`Start a conversation about "${topic.l}" in French. Greet Gurbani warmly and ask an opening question.`}]);
    state.spkMsgs=[{role:"assistant",content:reply}];
    ttsSpeak(reply,()=>{ const b=$("spk-banner"); if(b)b.style.display="none"; });
    const b=$("spk-banner"); if(b)b.style.display="flex";
  } catch { state.spkMsgs=[{role:"assistant",content:"Bonjour Gurbani ! Parlons en français !"}]; }
  state.spkBusy=false; spkRenderMsgs();
}

async function spkSend(text) {
  if (!text?.trim()||state.spkBusy) return;
  $("spk-inp").value=""; state.spkBusy=true;
  state.spkMsgs.push({role:"user",content:text}); spkRenderMsgs();
  try {
    const reply=await callAI(SYS_SPK, state.spkMsgs);
    state.spkMsgs.push({role:"assistant",content:reply});
    ttsSpeak(reply,()=>{ const b=$("spk-banner");if(b)b.style.display="none"; });
    const b=$("spk-banner");if(b)b.style.display="flex";
  } catch {}
  state.spkBusy=false; spkRenderMsgs();
  $("spk-end").disabled = state.spkMsgs.filter(m=>m.role==="user").length===0;
}

async function spkEnd() {
  state.spkView="feedback"; state.spkBusy=true; render();
  const conv=state.spkMsgs.map(m=>`${m.role==="user"?"GURBANI":"SOPHIE"}: ${m.content}`).join("\n");
  try {
    const d=await callAIJson(SYS_SPK_FB,`Conversation:\n${conv}`);
    state.spkFb=d;
    await saveProgress("speaking",d.score,state.spkTopic?.l);
  } catch { state.spkFb={overall:"Error loading feedback.",score:0,strengths:[],mistakes:[],suggestions:[],nextFocus:""}; }
  state.spkBusy=false; render();
}

// ── LISTENING ─────────────────────────────────────────────────
const LIS_TOPICS=["daily life in Paris","a French family weekend","conversation at a café","planning a holiday","French hobbies and culture"];
const SYS_LG=`Generate a B1 French spoken passage (130–150 words) on the topic. Add 3 comprehension questions IN FRENCH. Return ONLY valid JSON: {"passage":"...","questions":["q1","q2","q3"]}`;
const SYS_LE=`Evaluate Gurbani's comprehension answers. Return ONLY valid JSON: {"overall":"...","score":75,"results":[{"question":"...","answer":"...","correct":true,"feedback":"..."}],"nextFocus":"..."}`;
const SYS_DG=`Generate exactly 5 B1 French dictation sentences (10–18 words each, clear and natural). Return ONLY valid JSON: {"sentences":["s1","s2","s3","s4","s5"]}`;

function renderListening(parent) {
  const v=state.lisView;
  const wrap=document.createElement("div"); wrap.className="wrap";

  if (v==="sub") {
    wrap.innerHTML=`<div class="center" style="margin-bottom:20px"><span class="big-emoji">👂</span><h2>Listening Practice</h2><p class="sub">Choose an exercise type</p></div>`;
    const g=document.createElement("div"); g.className="g2";
    [{id:"comp",e:"🎧",l:"Comprehension",d:"Listen to a passage, answer 3 questions"},{id:"dict",e:"📝",l:"Dictation",d:"Hear sentences, type what you hear"}].forEach(x=>{
      const c=document.createElement("div"); c.className="card"; c.style.textAlign="center";
      c.innerHTML=`<div style="font-size:32px;margin-bottom:8px">${x.e}</div><div style="font-family:Georgia;font-size:16px;font-weight:bold;margin-bottom:6px">${x.l}</div><div style="font-size:13px;color:#888;line-height:1.5">${x.d}</div>`;
      c.addEventListener("click",()=>{ if(x.id==="comp"){state.lisView="ct";render();}else lisStartDict(); });
      g.appendChild(c);
    });
    wrap.appendChild(g);
  }
  else if (v==="ct") {
    wrap.innerHTML=`<h2 style="margin-bottom:16px">Choose a Topic</h2>`;
    const g=document.createElement("div"); g.className="g1";
    LIS_TOPICS.forEach(t=>{ const c=document.createElement("div"); c.className="card"; c.innerHTML=`🎧 <span style="font-size:14px">${t}</span>`; c.addEventListener("click",()=>lisStartComp(t)); g.appendChild(c); });
    wrap.appendChild(g);
  }
  else if (v==="cl") {
    if (state.lisBusy) { wrap.innerHTML=`<div class="center" style="padding:40px 0"><p style="font-family:Georgia;font-size:18px">Generating passage…</p></div>`; }
    else { wrap.innerHTML=`<div class="center"><span class="big-emoji">🎧</span><h2>Listen to the Passage</h2><p class="sub">Listen a few times before answering</p><div style="display:flex;gap:12px;justify-content:center"><button id="l-play" class="btn-g">▶ Play in French</button><button id="l-ans" class="btn">Answer Questions →</button></div></div>`; }
  }
  else if (v==="cq") {
    wrap.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2>Answer in French</h2><button id="l-replay" class="btn-g" style="padding:6px 14px;font-size:12px">▶ Replay</button></div>`;
    state.lisQs.forEach((q,i)=>{
      const c=document.createElement("div"); c.className="card"; c.style.marginBottom="12px";
      c.innerHTML=`<div style="font-family:Georgia;font-size:15px;margin-bottom:10px">${i+1}. ${q}</div><textarea class="ta" id="ans-${i}" style="min-height:52px" placeholder="Répondez en français…">${state.lisAns[i]||""}</textarea>`;
      wrap.appendChild(c);
    });
    const det=document.createElement("details"); det.style.marginBottom="14px";
    det.innerHTML=`<summary style="font-size:13px;color:#888;cursor:pointer">📄 Show transcript</summary><div class="card" style="margin-top:8px;font-size:14px;line-height:1.8">${state.lisPassage}</div>`;
    wrap.appendChild(det);
    const btn=document.createElement("button"); btn.className="btn-g"; btn.textContent="Submit Answers";
    btn.addEventListener("click",()=>{
      state.lisQs.forEach((_,i)=>{ state.lisAns[i]=$(`ans-${i}`)?.value||""; });
      lisSubmitComp();
    });
    wrap.appendChild(btn);
  }
  else if (v==="cr") {
    if (state.lisBusy) { wrap.innerHTML=`<div class="center" style="padding:40px 0"><p>Evaluating…</p></div>`; }
    else if (state.lisResult) {
      const r=state.lisResult;
      wrap.innerHTML=`<div class="center" style="margin-bottom:18px"><div class="big-score" style="color:${scoreColor(r.score)}">${r.score}</div><div style="font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-top:4px">out of 100</div><p style="font-size:14px;color:#555;margin-top:10px;line-height:1.7">${r.overall}</p></div>`;
      r.results?.forEach(res=>{
        const d=document.createElement("div"); d.className="card"; d.style.cssText=`margin-bottom:10px;border-color:${res.correct?"#b8e6d0":"#ffd0da"}`;
        d.innerHTML=`<div style="display:flex;gap:8px;margin-bottom:8px"><span>${res.correct?"✅":"❌"}</span><div style="font-family:Georgia;font-size:14px">${res.question}</div></div><div style="font-size:13px;color:#666;margin-bottom:4px"><strong>Your answer:</strong> ${res.answer}</div><div style="font-size:13px;color:${res.correct?"#2c5a42":"#c0392b"};line-height:1.6">${res.feedback}</div>`;
        wrap.appendChild(d);
      });
      if (r.nextFocus) { const b=document.createElement("div"); b.className="box-info"; b.innerHTML=`<strong>🎯 Focus:</strong> ${r.nextFocus}`; wrap.appendChild(b); }
      const btns=document.createElement("div"); btns.style.cssText="display:flex;gap:12px";
      const b1=document.createElement("button"); b1.className="btn"; b1.textContent="Try Again"; b1.addEventListener("click",()=>{ state.lisView="sub";state.lisResult=null;render(); });
      const b2=document.createElement("button"); b2.className="btn-o"; b2.textContent="← Home"; b2.addEventListener("click",()=>{ state.screen="home";render(); });
      btns.append(b1,b2); wrap.appendChild(btns);
    }
  }
  else if (v==="dp") {
    if (state.lisBusy) { wrap.innerHTML=`<div class="center" style="padding:40px 0"><p style="font-family:Georgia;font-size:18px">Preparing dictation…</p></div>`; }
    else { wrap.innerHTML=`<div class="center"><div style="font-size:12px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Sentence ${state.lisDIdx+1} of ${state.lisSents.length}</div><h2>📝 Dictation</h2><div class="card" style="padding:28px;margin:16px 0;text-align:center"><p style="font-size:14px;color:#888;margin-bottom:14px">Listen carefully, then click Type Answer</p><button id="d-play" class="btn">▶ Play Sentence</button></div><button id="d-next" class="btn-o">Type My Answer →</button></div>`; }
  }
  else if (v==="dt") {
    wrap.innerHTML=`<div style="text-align:center;font-size:12px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Sentence ${state.lisDIdx+1} of ${state.lisSents.length}</div><h2 style="text-align:center;margin-bottom:14px">Type What You Heard</h2><div style="text-align:center;margin-bottom:14px"><button id="dt-replay" class="btn-g" style="padding:6px 16px;font-size:12px">▶ Replay</button></div><textarea id="d-inp" class="ta" style="min-height:80px;margin-bottom:14px" placeholder="Écrivez exactement ce que vous avez entendu…">${state.lisDInput}</textarea><button id="d-check" class="btn">${state.lisDIdx<state.lisSents.length-1?"Check & Next →":"Check & See Results"}</button>`;
  }
  else if (v==="dr") {
    const avg=Math.round(state.lisDResults.reduce((a,r)=>a+r.acc,0)/state.lisDResults.length);
    wrap.innerHTML=`<div class="center" style="margin-bottom:20px"><div class="big-score" style="color:${scoreColor(avg)}">${avg}%</div><div style="font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-top:4px">Accuracy</div></div>`;
    state.lisDResults.forEach((r,i)=>{
      const d=document.createElement("div"); d.className="card"; d.style.cssText=`margin-bottom:10px;border-color:${r.acc>=80?"#b8e6d0":"#ffd0da"}`;
      d.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:11px;color:#888">Sentence ${i+1}</span><span style="font-size:13px;font-weight:bold;color:${r.acc>=80?"#2e9e7a":"#e74c6f"}">${r.acc}%</span></div><div style="font-size:13px;color:#555;margin-bottom:4px"><strong>Expected:</strong> ${r.sent}</div><div style="font-size:13px;color:${r.acc>=90?"#2c5a42":"#c0392b"}"><strong>You wrote:</strong> ${r.typed}</div>`;
      wrap.appendChild(d);
    });
    const btns=document.createElement("div"); btns.style.cssText="display:flex;gap:12px;margin-top:14px";
    const b1=document.createElement("button"); b1.className="btn"; b1.textContent="Try Again"; b1.addEventListener("click",()=>{ state.lisView="sub";state.lisDResults=[];render(); });
    const b2=document.createElement("button"); b2.className="btn-o"; b2.textContent="← Home"; b2.addEventListener("click",()=>{ state.screen="home";render(); });
    btns.append(b1,b2); wrap.appendChild(btns);
  }

  parent.appendChild(wrap);

  // Wire up events
  $("l-play")?.addEventListener("click",()=>ttsSpeak(state.lisPassage));
  $("l-ans")?.addEventListener("click",()=>{ state.lisView="cq"; render(); });
  $("l-replay")?.addEventListener("click",()=>ttsSpeak(state.lisPassage));
  $("d-play")?.addEventListener("click",()=>state.lisSents[state.lisDIdx]&&ttsSpeak(state.lisSents[state.lisDIdx]));
  $("d-next")?.addEventListener("click",()=>{ state.lisView="dt"; render(); });
  $("dt-replay")?.addEventListener("click",()=>state.lisSents[state.lisDIdx]&&ttsSpeak(state.lisSents[state.lisDIdx]));
  $("d-inp")?.addEventListener("input",e=>state.lisDInput=e.target.value);
  $("d-check")?.addEventListener("click",()=>{
    const inp=$("d-inp"); if(inp)state.lisDInput=inp.value;
    const exp=state.lisSents[state.lisDIdx].toLowerCase().replace(/[.,!?;:]/g,"").trim().split(" ");
    const got=state.lisDInput.toLowerCase().replace(/[.,!?;:]/g,"").trim().split(" ");
    const acc=Math.round(exp.filter((w,i)=>got[i]===w).length/exp.length*100);
    state.lisDResults.push({sent:state.lisSents[state.lisDIdx],typed:state.lisDInput,acc});
    state.lisDInput="";
    if (state.lisDIdx<state.lisSents.length-1){state.lisDIdx++;state.lisView="dp";}else{state.lisView="dr";saveProgress("listening",acc,"Dictation");}
    render();
  });
}

async function lisStartComp(topic) {
  state.lisBusy=true; state.lisView="cl"; state.lisAns={}; render();
  try { const d=await callAIJson(SYS_LG,`Topic: ${topic}`); state.lisPassage=d.passage; state.lisQs=d.questions||[]; }
  catch { state.lisPassage="Error loading. Please go back and try again."; state.lisQs=[]; }
  state.lisBusy=false; render();
}

async function lisSubmitComp() {
  state.lisBusy=true; state.lisView="cr"; render();
  const qa=state.lisQs.map((q,i)=>`Q: ${q}\nA: ${state.lisAns[i]||"(no answer)"}`).join("\n\n");
  try {
    const d=await callAIJson(SYS_LE,`Passage:\n${state.lisPassage}\n\nAnswers:\n${qa}`);
    state.lisResult=d; await saveProgress("listening",d.score,"Comprehension");
  } catch { state.lisResult={overall:"Error.",score:0,results:[],nextFocus:""}; }
  state.lisBusy=false; render();
}

async function lisStartDict() {
  state.lisBusy=true; state.lisView="dp"; state.lisDIdx=0; state.lisDResults=[]; render();
  try { const d=await callAIJson(SYS_DG,"Generate 5 B1 French dictation sentences."); state.lisSents=d.sentences||[]; }
  catch { state.lisSents=["Je vais au marché tous les samedis.","Elle travaille dans un bureau à Paris.","Nous aimons voyager en train en France.","Il fait beau aujourd'hui, allons nous promener.","Ma famille mange ensemble chaque soir."]; }
  state.lisBusy=false; render();
}

      const r=state.rdResult;
      wrap.innerHTML=`<div class="center" style="margin-bottom:18px"><div class="big-score" style="color:${scoreColor(r.score)}">${r.score}</div><div style="font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-top:4px">out of 100</div><p style="font-size:14px;color:#555;margin-top:10px;line-height:1.7">${r.overall}</p></div>`;
      if (r.strengths?.length) { const b=document.createElement("div"); b.className="box-good"; b.innerHTML=r.strengths.map(x=>`<div style="margin-bottom:4px">✓ ${x}</div>`).join(""); wrap.appendChild(b); }
      r.results?.forEach(res=>{ const d=document.createElement("div"); d.className="card"; d.style.cssText=`margin-bottom:10px;border-color:${res.correct?"#b8e6d0":"#ffd0da"}`; d.innerHTML=`<div style="display:flex;gap:8px;margin-bottom:8px"><span>${res.correct?"✅":"❌"}</span><div style="font-family:Georgia;font-size:14px">${res.question}</div></div><div style="font-size:13px;color:#666;margin-bottom:4px"><strong>Your answer:</strong> ${res.answer}</div><div style="font-size:13px;color:${res.correct?"#2c5a42":"#c0392b"};line-height:1.6">${res.feedback}</div>`; wrap.appendChild(d); });
      if (r.nextFocus) { const b=document.createElement("div"); b.className="box-info"; b.innerHTML=`<strong>🎯 Focus:</strong> ${r.nextFocus}`; wrap.appendChild(b); }
      const btns=document.createElement("div"); btns.style.cssText="display:flex;gap:12px";
      const b1=document.createElement("button"); b1.className="btn"; b1.textContent="Try Another"; b1.addEventListener("click",()=>{ state.rdView="topics";state.rdContent=null;state.rdAns={};state.rdResult=null;render(); });
      const b2=document.createElement("button"); b2.className="btn-o"; b2.textContent="← Home"; b2.addEventListener("click",()=>{ state.screen="home";render(); });
      btns.append(b1,b2); wrap.appendChild(btns);
    }
  }

  parent.appendChild(wrap);
  $("rd-listen")?.addEventListener("click",()=>{ if(ttsActive)ttsStop(); else ttsSpeak(state.rdContent?.passage); });
}

async function rdLoad(topic) {
  state.rdBusy=true; state.rdView="read"; state.rdAns={}; render();
  try { const d=await callAIJson(SYS_RG,`Topic: ${topic.l}`); state.rdContent=d; }
  catch { state.rdContent={title:"Error",passage:"Could not load. Please go back and try again.",questions:[]}; }
  state.rdBusy=false; render();
}

async function rdSubmit() {
  state.rdBusy=true; state.rdView="result"; render();
  const qa=state.rdContent.questions.map((q,i)=>`Q: ${q}\nA: ${state.rdAns[i]||"(no answer)"}`).join("\n\n");
  try {
    const d=await callAIJson(SYS_RE,`Passage:\n${state.rdContent.passage}\n\nAnswers:\n${qa}`);
    state.rdResult=d; await saveProgress("reading",d.score,state.rdContent.title);
  } catch { state.rdResult={overall:"Error.",score:0,strengths:[],results:[],nextFocus:""}; }
  state.rdBusy=false; render();
}

// ── WRITING ───────────────────────────────────────────────────
const WR_PROMPTS=[
  {id:"weekend",e:"🌅",l:"Mon Weekend Idéal",p:"Décrivez votre weekend idéal — que feriez-vous, avec qui, où iriez-vous ?"},
  {id:"voyage",e:"✈️",l:"Un Voyage Mémorable",p:"Racontez un voyage réel ou rêvé. Décrivez le lieu, les activités et vos impressions."},
  {id:"routine",e:"⏰",l:"Ma Routine Quotidienne",p:"Décrivez votre routine quotidienne du matin au soir en détail."},
  {id:"plat",e:"🍽️",l:"Mon Plat Préféré",p:"Décrivez votre plat préféré : ingrédients, préparation, pourquoi vous l'aimez."},
  {id:"ville",e:"🏙️",l:"Ma Ville",p:"Décrivez la ville où vous habitez — ce qui vous plaît et ce qui pourrait être amélioré."},
  {id:"tech",e:"📱",l:"La Technologie",p:"Comment les réseaux sociaux ont-ils changé votre vie ? Avantages et inconvénients ?"},
];
const SYS_WFB=`You are a French writing teacher evaluating Gurbani's B1 written work. Return ONLY valid JSON: {"overall":"...","score":72,"strengths":["..."],"mistakes":[{"original":"exact phrase","correction":"corrected phrase","explanation":"English explanation","category":"Grammar"}],"suggestions":["useful French phrase"],"nextFocus":"one specific improvement"}`;

function renderWriting(parent) {
  const wrap=document.createElement("div"); wrap.className="wrap";

  if (state.wrView==="prompts") {
    wrap.innerHTML=`<div class="center" style="margin-bottom:20px"><span class="big-emoji">✍️</span><h2>Writing Practice</h2><p class="sub">Choose a prompt and write at least 80 words in French</p></div>`;
    const g=document.createElement("div"); g.className="g2";
    WR_PROMPTS.forEach(p=>{ const c=document.createElement("div"); c.className="card"; c.innerHTML=`<div style="font-size:26px;margin-bottom:8px">${p.e}</div><div style="font-family:Georgia;font-size:14px;font-weight:bold;margin-bottom:4px">${p.l}</div><div style="font-size:12px;color:#888;line-height:1.5">${p.p.slice(0,55)}…</div>`; c.addEventListener("click",()=>{ state.wrPrompt=p;state.wrView="write";state.wrText="";render(); }); g.appendChild(c); });
    wrap.appendChild(g);
  }
  else if (state.wrView==="write") {
    const pr=state.wrPrompt;
    wrap.innerHTML=`<div class="box-info"><div style="font-weight:bold;color:#c9a96e;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">${pr.e} ${pr.l}</div>${pr.p}</div>`;
    const ta=document.createElement("textarea"); ta.className="ta"; ta.style.minHeight="280px"; ta.style.marginBottom="12px"; ta.placeholder="Écrivez en français ici… (minimum 80 mots)"; ta.value=state.wrText;
    ta.addEventListener("input",e=>{ state.wrText=e.target.value; const wc=state.wrText.trim().split(/\s+/).filter(Boolean).length; $("wr-wc").textContent=`${wc} / 80 mots ${wc>=80?"✓":""}`; $("wr-wc").style.color=wc>=80?"#2e9e7a":"#e6954a"; });
    wrap.appendChild(ta);
    const row=document.createElement("div"); row.style.cssText="display:flex;align-items:center;justify-content:space-between";
    const wc=state.wrText.trim().split(/\s+/).filter(Boolean).length;
    row.innerHTML=`<span id="wr-wc" style="font-size:13px;color:${wc>=80?"#2e9e7a":"#e6954a"}">${wc} / 80 mots ${wc>=80?"✓":""}</span>`;
    const btn=document.createElement("button"); btn.className="btn"; btn.style.cssText="background:#c9a96e;color:#1a1a2e"; btn.textContent="Get Feedback →"; btn.disabled=wc<20;
    btn.addEventListener("click",()=>{ state.wrText=ta.value; wrSubmit(); });
    row.appendChild(btn); wrap.appendChild(row);
  }
  else if (state.wrView==="feedback") {
    if (state.wrBusy) { wrap.innerHTML=`<div class="center" style="padding:60px 0"><div style="font-size:36px;margin-bottom:12px">✍️</div><p style="font-family:Georgia;font-size:20px">Reviewing Gurbani's writing…</p></div>`; }
    else if (state.wrFb) renderFeedback(wrap, state.wrFb, ()=>{ state.wrView="prompts";state.wrFb=null;render(); }, ()=>{ state.screen="home";render(); });
  }

  parent.appendChild(wrap);
}

async function wrSubmit() {
  state.wrBusy=true; state.wrView="feedback"; render();
  try {
    const d=await callAIJson(SYS_WFB,`Prompt: ${state.wrPrompt.p}\n\nGurbani's writing:\n${state.wrText}`);
    state.wrFb=d; await saveProgress("writing",d.score,state.wrPrompt.l);
  } catch { state.wrFb={overall:"Error loading feedback.",score:0,strengths:[],mistakes:[],suggestions:[],nextFocus:""}; }
  state.wrBusy=false; render();
}

// ── SAVE PROGRESS ─────────────────────────────────────────────
async function saveProgress(skill, score, topic) {
  const updated = addSession(state.progress||emptyProg(), skill, score, topic);
  state.progress = updated;
  await fbSave(updated);
}

// ── INIT ──────────────────────────────────────────────────────
(async () => {
  if (state.apiKey) {
    state.progress = (await fbLoad()) || emptyProg();
  }
  render();
})();
</script>
</body>
</html>
