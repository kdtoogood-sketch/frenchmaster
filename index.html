<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>French Master 🇫🇷</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf6f0;font-family:Arial,sans-serif;color:#1a1a2e;min-height:100vh}
h1,h2,h3{font-family:Georgia,serif}
button{cursor:pointer;font-family:Arial,sans-serif}
textarea,input{font-family:Arial,sans-serif}
.hdr{background:#1a1a2e;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.htitle{font-family:Georgia;color:#f5e6c8;font-size:16px;font-weight:bold}
.hsub{color:#c9a96e;font-size:10px;letter-spacing:2px;text-transform:uppercase}
.wrap{max-width:660px;margin:0 auto;padding:22px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.g1{display:grid;gap:10px;margin-bottom:16px}
.card{background:#fff;border:2px solid #ede8df;border-radius:12px;padding:16px;cursor:pointer;transition:border-color .2s}
.card:hover{border-color:#c9a96e}
.btn{background:#1a1a2e;color:#f5e6c8;border:none;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:bold}
.btn:disabled{background:#ccc;color:#999;cursor:not-allowed}
.btn-g{background:#2e9e7a;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:bold}
.btn-o{background:transparent;color:#1a1a2e;border:2px solid #1a1a2e;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:bold}
.btn-r{background:transparent;color:#e74c6f;border:2px solid #e74c6f;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:bold}
.inp{border:2px solid #ede8df;border-radius:8px;padding:10px 14px;font-size:14px;outline:none;background:#faf6f0;width:100%}
.ta{border:2px solid #ede8df;border-radius:8px;padding:12px;font-size:14px;outline:none;background:#faf6f0;resize:vertical;width:100%;line-height:1.7}
.box-y{background:#fff8ef;border:1px solid #f0d9a8;border-radius:8px;padding:12px 14px;color:#6b4f1a;line-height:1.6;margin-bottom:12px;font-size:13px}
.box-g{background:#f0faf5;border:1px solid #b8e6d0;border-radius:8px;padding:12px 14px;color:#2c5a42;margin-bottom:12px;font-size:13px}
.box-p{background:#f5f0ff;border:1px solid #d4c5f0;border-radius:8px;padding:12px 14px;color:#4a3480;margin-bottom:12px;font-size:13px}
.box-r{background:#fff0f3;border:1px solid #ffd0da;border-radius:8px;padding:12px 14px;color:#c0392b;margin-bottom:12px;font-size:13px}
.sub{color:#888;font-size:14px;line-height:1.6;margin-bottom:18px}
.chat-box{padding:14px;display:flex;flex-direction:column;gap:10px;min-height:240px;max-height:50vh;overflow-y:auto;background:#faf6f0}
.bub-s{display:flex;align-items:flex-start;gap:8px}
.bub-u{display:flex;justify-content:flex-end}
.av{width:28px;height:28px;border-radius:50%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ms{background:#fff;border:1px solid #ede8df;border-radius:14px 14px 14px 3px;padding:9px 13px;font-size:14px;line-height:1.7;max-width:72%}
.mu{background:#1a1a2e;color:#f5e6c8;border-radius:14px 14px 3px 14px;padding:9px 13px;font-size:14px;line-height:1.7;max-width:72%}
.sn{font-size:10px;color:#c9a96e;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.loader{text-align:center;padding:50px 16px}
.loader p{font-family:Georgia;font-size:18px;color:#1a1a2e;margin-top:12px}
.score-big{font-family:Georgia;font-size:54px;font-weight:bold;line-height:1}
.setup-wrap{min-height:100vh;background:#1a1a2e;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-box{background:#fff;border-radius:14px;padding:26px;max-width:400px;width:100%}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stat{text-align:center;background:#faf6f0;border-radius:8px;padding:8px 4px}
.snum{font-family:Georgia;font-size:24px;font-weight:bold}
.slbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px}
</style>
</head>
<body>
<div id="app"></div>
<script>

// ─── CONFIG ────────────────────────────────────────────────────
const FB_URL = "https://firestore.googleapis.com/v1/projects/propdesk-f50e0/databases/(default)/documents/frenchmaster/gurbani?key=AIzaSyBiBmFAJHTxoZAddAON94u7FQ_d-RpX2io";
const GEMINI_MODEL = "gemini-2.0-flash";

// ─── STATE ─────────────────────────────────────────────────────
const S = {
  key: localStorage.getItem("fm_key")||"",
  screen: "home",
  progress: null,
  // speaking
  spkView:"topics", spkTopic:null, spkMsgs:[], spkBusy:false, spkFb:null, spkFbBusy:false,
  // listening
  lisView:"sub", lisBusy:false, lisPassage:"", lisQs:[], lisAns:{}, lisResult:null,
  lisSents:[], lisDIdx:0, lisDInput:"", lisDResults:[],
  // reading
  rdView:"topics", rdBusy:false, rdContent:null, rdAns:{}, rdResult:null,
  // writing
  wrView:"prompts", wrPrompt:null, wrText:"", wrBusy:false, wrFb:null,
};

const $ = id => document.getElementById(id);
function sc(s){return s>=75?"#2e9e7a":s>=55?"#e6954a":"#e74c6f";}

// ─── FIREBASE ──────────────────────────────────────────────────
async function fbLoad(){
  try{const r=await fetch(FB_URL);if(!r.ok)return null;const d=await r.json();return JSON.parse(d.fields?.data?.stringValue||"null");}catch{return null;}
}
async function fbSave(data){
  try{await fetch(FB_URL+"&updateMask.fieldPaths=data",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({fields:{data:{stringValue:JSON.stringify(data)}}})});}catch{}
}
function emptyProg(){return{sessions:[],streak:{current:0,longest:0,lastDate:""},totalSessions:0};}
async function saveSession(skill,score,topic){
  const today=new Date().toISOString().split("T")[0];
  const yest=new Date(Date.now()-86400000).toISOString().split("T")[0];
  const p=S.progress||emptyProg();
  const st=p.streak||{current:0,longest:0,lastDate:""};
  let cur=st.current;
  if(st.lastDate!==today)cur=st.lastDate===yest?st.current+1:1;
  const sessions=[{id:Date.now(),date:today,skill,score,topic},...(p.sessions||[])].slice(0,60);
  S.progress={sessions,streak:{current:cur,longest:Math.max(st.longest||0,cur),lastDate:today},totalSessions:(p.totalSessions||0)+1};
  await fbSave(S.progress);
}

// ─── GEMINI ────────────────────────────────────────────────────
async function ai(sys, msgs){
  // inject system as first user turn for compatibility
  const contents=[{role:"user",parts:[{text:"[System instructions - follow these strictly]: "+sys+"\n\nNow begin."}]},{role:"model",parts:[{text:"Understood, I will follow those instructions."}]},...msgs.map(m=>({role:m.r==="a"?"model":"user",parts:[{text:m.t}]}))];
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${S.key}`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents,generationConfig:{maxOutputTokens:1200}})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"Gemini error");
  return d.candidates?.[0]?.content?.parts?.[0]?.text||"";
}
async function aiJSON(sys, msg){
  const raw=await ai(sys,[{r:"u",t:msg}]);
  const s=Math.min(raw.indexOf("{")>=0?raw.indexOf("{"):9999,raw.indexOf("[")>=0?raw.indexOf("["):9999);
  const e=Math.max(raw.lastIndexOf("}"),raw.lastIndexOf("]"));
  if(s===9999||e===-1)throw new Error("No JSON in response");
  return JSON.parse(raw.slice(s,e+1));
}

// ─── TTS ───────────────────────────────────────────────────────
let ttsOn=false;
function speak(text,cb){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();ttsOn=true;
  const u=new SpeechSynthesisUtterance(text);
  u.lang="fr-FR";u.rate=0.85;
  const vs=speechSynthesis.getVoices();
  const fv=vs.find(v=>v.lang==="fr-FR")||vs.find(v=>v.lang.startsWith("fr"));
  if(fv)u.voice=fv;
  u.onend=()=>{ttsOn=false;cb?.();};
  u.onerror=()=>{ttsOn=false;};
  speechSynthesis.speak(u);
}
function speakStop(){speechSynthesis?.cancel();ttsOn=false;}

// ─── STT ───────────────────────────────────────────────────────
let sttRec=null;
const sttOk=!!(window.SpeechRecognition||window.webkitSpeechRecognition);
let micOn=false;
function micStart(onDone){
  if(!sttOk)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  sttRec=new SR();sttRec.lang="fr-FR";sttRec.interimResults=false;
  sttRec.onresult=e=>{micOn=false;onDone(e.results[0][0].transcript);};
  sttRec.onerror=()=>{micOn=false;updateMicBtn();};
  sttRec.onend=()=>{micOn=false;updateMicBtn();};
  sttRec.start();micOn=true;updateMicBtn();
}
function micStop(){sttRec?.stop();micOn=false;updateMicBtn();}
function updateMicBtn(){
  const b=$("mic-btn");
  if(!b)return;
  b.style.background=micOn?"#e74c6f":"#1a1a2e";
  b.textContent=micOn?"⏹":"🎤";
}
function autoMic(onDone){
  if(!sttOk)return;
  setTimeout(()=>{
    micOn=true;updateMicBtn();
    micStart(t=>{if(t?.trim()){onDone(t);}});
  },400);
}

// ─── RENDER ENGINE ─────────────────────────────────────────────
function render(){
  const app=$("app");
  app.innerHTML="";
  if(!S.key){renderSetup(app);return;}
  // header
  const hdr=document.createElement("div");hdr.className="hdr";
  hdr.innerHTML=`<div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">🇫🇷</span><div><div class="htitle">French Master</div><div class="hsub">Gurbani Kaur · B1</div></div></div><div style="display:flex;align-items:center;gap:8px">${S.progress?`<span style="background:#c9a96e;color:#1a1a2e;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:bold">🔥${S.progress.streak?.current||0}</span>`:""} ${S.screen!=="home"?`<button onclick="go('home')" style="background:transparent;color:#aaa;border:1px solid #444;padding:5px 12px;border-radius:4px;font-size:12px">← Home</button>`:""}</div>`;
  app.appendChild(hdr);
  const body=document.createElement("div");body.id="body";app.appendChild(body);
  const fn={home:renderHome,speaking:renderSpeaking,listening:renderListening,reading:renderReading,writing:renderWriting};
  fn[S.screen]?.(body);
}
function go(screen){S.screen=screen;render();}

// ─── SETUP ─────────────────────────────────────────────────────
function renderSetup(app){
  app.innerHTML=`<div class="setup-wrap"><div class="setup-box">
    <div style="text-align:center;margin-bottom:18px"><div style="font-size:46px;margin-bottom:8px">🇫🇷</div><h1 style="font-size:22px;margin-bottom:4px">French Master</h1><p style="color:#888;font-size:13px">For Gurbani Kaur</p></div>
    <div class="box-y"><strong>Free setup (2 min):</strong><br>1. Go to <strong>aistudio.google.com</strong><br>2. Click <strong>Get API Key → Create API Key</strong><br>3. Copy & paste the key below</div>
    <input id="kinp" class="inp" placeholder="AIzaSy…" style="margin-bottom:8px"/>
    <div id="kerr" style="color:#e74c6f;font-size:13px;margin-bottom:8px;display:none"></div>
    <button class="btn" style="width:100%;padding:12px;font-size:14px" onclick="doSetup()">Start Learning 🚀</button>
  </div></div>`;
}
function doSetup(){
  const k=$("kinp").value.trim();
  if(!k.startsWith("AIza")){$("kerr").textContent="Key should start with AIza…";$("kerr").style.display="block";return;}
  S.key=k;localStorage.setItem("fm_key",k);
  fbLoad().then(p=>{S.progress=p||emptyProg();render();});
}

// ─── HOME ──────────────────────────────────────────────────────
function renderHome(body){
  const p=S.progress;
  const avg=sk=>{if(!p?.sessions?.length)return null;const ss=p.sessions.filter(s=>s.skill===sk).slice(0,10);return ss.length?Math.round(ss.reduce((a,s)=>a+s.score,0)/ss.length):null;};
  const w=document.createElement("div");w.className="wrap";
  w.innerHTML=`<div style="text-align:center;margin-bottom:22px"><div style="font-size:11px;color:#c9a96e;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px">Bienvenue 🌸</div><h1 style="font-size:26px;margin-bottom:6px">Bonjour, Gurbani Kaur!</h1><p class="sub">Your personal French B1 app — 4 skills, progress saved automatically</p></div>`;
  // progress
  if(p?.sessions?.length){
    const avgAll=Math.round(p.sessions.slice(0,5).reduce((a,s)=>a+s.score,0)/Math.min(p.sessions.length,5));
    const pd=document.createElement("div");pd.style.cssText="background:#fff;border:2px solid #ede8df;border-radius:12px;padding:14px;margin-bottom:16px";
    pd.innerHTML=`<div class="stat-row"><div class="stat"><div class="snum" style="color:#c9a96e">${p.streak?.current||0}</div><div class="slbl">Streak 🔥</div></div><div class="stat"><div class="snum">${p.totalSessions||0}</div><div class="slbl">Sessions</div></div><div class="stat"><div class="snum">${p.streak?.longest||0}</div><div class="slbl">Best</div></div><div class="stat"><div class="snum" style="color:#2e9e7a">${avgAll||"—"}</div><div class="slbl">Avg</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px">${[{id:"speaking",e:"🎤",c:"#e74c6f"},{id:"listening",e:"👂",c:"#2e9e7a"},{id:"reading",e:"📖",c:"#7c5cbf"},{id:"writing",e:"✍️",c:"#c9a96e"}].map(sk=>`<div style="text-align:center;background:#faf6f0;border-radius:6px;padding:6px 2px"><div style="font-size:16px">${sk.e}</div><div style="font-family:Georgia;font-size:15px;font-weight:bold;color:${avg(sk.id)?sk.c:"#ccc"}">${avg(sk.id)||"—"}</div></div>`).join("")}</div><div style="border-top:1px solid #ede8df;padding-top:10px">${p.sessions.slice(0,3).map(s=>`<div style="display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:4px"><span>${s.date} · ${s.skill} · ${s.topic||""}</span><span style="font-weight:bold;color:${sc(s.score)}">${s.score}</span></div>`).join("")}</div>`;
    w.appendChild(pd);
  }
  // skill cards
  const g=document.createElement("div");g.className="g2";
  [{id:"speaking",e:"🎤",l:"Speaking",d:"Voice chat with Sophie 🔊",c:"#e74c6f"},{id:"listening",e:"👂",l:"Listening",d:"Comprehension & dictation",c:"#2e9e7a"},{id:"reading",e:"📖",l:"Reading",d:"Read passages & answer Qs",c:"#7c5cbf"},{id:"writing",e:"✍️",l:"Writing",d:"Write French, get corrections",c:"#c9a96e"}].forEach(c=>{
    const d=document.createElement("div");
    d.style.cssText=`background:#fff;border:2px solid ${c.c};border-radius:12px;padding:18px;cursor:pointer`;
    d.innerHTML=`<div style="font-size:30px;margin-bottom:8px">${c.e}</div><div style="font-family:Georgia;font-size:17px;font-weight:bold;margin-bottom:4px">${c.l}</div><div style="font-size:12px;color:#888;line-height:1.5">${c.d}</div>`;
    d.onclick=()=>go(c.id);g.appendChild(d);
  });
  w.appendChild(g);
  w.innerHTML+=`<div class="box-p">💡 B1 Level · Use <strong>Chrome</strong> for voice · Progress saves to Firebase</div><div style="text-align:center"><button onclick="localStorage.removeItem('fm_key');S.key='';render()" style="background:none;border:none;color:#bbb;font-size:11px;cursor:pointer">⚙️ Change API Key</button></div>`;
  body.appendChild(w);
}

// ─── SPEAKING ──────────────────────────────────────────────────
const SPK_TOPICS=[{id:"voyage",l:"Voyage & Vacances",e:"✈️"},{id:"famille",l:"Famille & Amis",e:"👨‍👩‍👧"},{id:"cuisine",l:"Nourriture",e:"🥐"},{id:"travail",l:"Travail",e:"💼"},{id:"loisirs",l:"Loisirs",e:"🎨"},{id:"cinema",l:"Cinéma & Culture",e:"🎬"}];
const SYS_SPK=`You are Sophie, a warm encouraging French tutor speaking with Gurbani, a B1 learner. ALWAYS reply in French. Keep replies to 2-3 sentences max. Never correct mistakes during conversation. Always end with a question to keep the conversation going.`;
const SYS_SPK_FB=`You are a French teacher reviewing a B1 learner's conversation. Analyse ONLY the lines labelled GURBANI. Return ONLY valid JSON with no extra text: {"overall":"2-3 sentence assessment in English","score":72,"strengths":["strength1","strength2"],"mistakes":[{"original":"what she wrote","correction":"correct version","explanation":"English explanation","category":"Grammar"}],"suggestions":["useful French B1 expression"],"nextFocus":"one thing to work on"}`;

function renderSpeaking(body){
  if(S.spkView==="topics"){
    const w=document.createElement("div");w.className="wrap";
    w.innerHTML=`<div style="text-align:center;margin-bottom:18px"><div style="font-size:40px;margin-bottom:8px">🎤</div><h2>Speaking Practice</h2><p class="sub">Pick a topic — Sophie speaks first 🔊 then your mic opens automatically 🎤</p>${!sttOk?`<div class="box-y">⚠️ Use Chrome for voice. You can type instead.</div>`:""}</div>`;
    const g=document.createElement("div");g.className="g2";
    SPK_TOPICS.forEach(t=>{const c=document.createElement("div");c.className="card";c.style.display="flex";c.style.alignItems="center";c.style.gap="10px";c.innerHTML=`<span style="font-size:24px">${t.e}</span><div><div style="font-family:Georgia;font-size:14px;font-weight:bold">${t.l}</div><div style="font-size:11px;color:#888;margin-top:2px">Tap to start</div></div>`;c.onclick=()=>spkStart(t);g.appendChild(c);});
    w.appendChild(g);body.appendChild(w);return;
  }
  if(S.spkView==="feedback"){
    if(S.spkFbBusy){body.innerHTML=`<div class="loader"><div style="font-size:34px">🔍</div><p>Analysing your French…</p></div>`;return;}
    if(S.spkFb)renderFeedback(body,S.spkFb,()=>{S.spkView="topics";S.spkMsgs=[];S.spkFb=null;render();},()=>go("home"));
    return;
  }
  // chat
  const turns=S.spkMsgs.filter(m=>m.r==="u").length;
  const wrap=document.createElement("div");wrap.style.cssText="max-width:700px;margin:0 auto";
  wrap.innerHTML=`<div style="background:#fff;border-bottom:1px solid #ede8df;padding:9px 16px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px;color:#666">${S.spkTopic?.e} ${S.spkTopic?.l} · <strong>${turns}</strong> turns</span><button id="spk-end" class="btn-r" ${turns===0?"disabled":""} onclick="spkEnd()">End & Feedback</button></div>`;
  const chatBox=document.createElement("div");chatBox.className="chat-box";chatBox.id="chat-box";
  S.spkMsgs.forEach(m=>{
    const d=document.createElement("div");
    if(m.r==="a"){d.className="bub-s";d.innerHTML=`<div class="av">🇫🇷</div><div class="ms"><div class="sn">Sophie</div>${m.t}</div>`;}
    else{d.className="bub-u";d.innerHTML=`<div class="mu">${m.t}</div>`;}
    chatBox.appendChild(d);
  });
  if(S.spkBusy){const d=document.createElement("div");d.className="bub-s";d.innerHTML=`<div class="av">🇫🇷</div><div class="ms" style="color:#888">Sophie is thinking…</div>`;chatBox.appendChild(d);}
  wrap.appendChild(chatBox);
  // speaking banner
  const banner=document.createElement("div");banner.id="spk-banner";banner.style.cssText="display:none;background:#fff8ef;padding:5px 16px;font-size:12px;color:#c9a96e;align-items:center;justify-content:space-between";
  banner.innerHTML=`<span>🔊 Sophie is speaking…</span><button onclick="speakStop();document.getElementById('spk-banner').style.display='none'" style="background:none;border:none;color:#888;font-size:12px;cursor:pointer">⏹ Stop</button>`;
  wrap.appendChild(banner);
  // input bar
  const bar=document.createElement("div");bar.style.cssText="background:#fff;border-top:1px solid #ede8df;padding:10px 14px;display:flex;gap:8px;align-items:center";
  if(sttOk){const mb=document.createElement("button");mb.id="mic-btn";mb.style.cssText="width:46px;height:46px;border-radius:50%;background:#1a1a2e;color:#f5e6c8;border:none;font-size:18px;flex-shrink:0";mb.textContent="🎤";mb.onclick=()=>{if(micOn){micStop();}else{micStart(t=>{if(t?.trim())spkSend(t);});}};bar.appendChild(mb);}
  const inp=document.createElement("input");inp.className="inp";inp.id="spk-inp";inp.placeholder=sttOk?"Or type in French…":"Type in French…";inp.onkeydown=e=>{if(e.key==="Enter")spkSend(inp.value);};bar.appendChild(inp);
  const sb=document.createElement("button");sb.className="btn";sb.textContent="Send";sb.onclick=()=>spkSend($("spk-inp")?.value);bar.appendChild(sb);
  wrap.appendChild(bar);
  body.appendChild(wrap);
  chatBox.scrollTop=chatBox.scrollHeight;
}

async function spkStart(topic){
  S.spkTopic=topic;S.spkView="chat";S.spkMsgs=[];S.spkBusy=true;render();
  try{
    const reply=await ai(SYS_SPK,[{r:"u",t:`Start a warm conversation in French about "${topic.l}". Greet Gurbani warmly and ask one opening question.`}]);
    S.spkMsgs=[{r:"a",t:reply}];S.spkBusy=false;render();
    const banner=$("spk-banner");if(banner)banner.style.display="flex";
    speak(reply,()=>{
      if($("spk-banner"))$("spk-banner").style.display="none";
      if(sttOk)autoMic(t=>{if(t)spkSend(t);});
    });
  }catch(e){S.spkMsgs=[{r:"a",t:`Erreur: ${e.message}. Vérifiez votre clé API.`}];S.spkBusy=false;render();}
}

async function spkSend(text){
  if(!text?.trim()||S.spkBusy)return;
  if($("spk-inp"))$("spk-inp").value="";
  S.spkMsgs.push({r:"u",t:text});S.spkBusy=true;render();
  try{
    const reply=await ai(SYS_SPK,S.spkMsgs);
    S.spkMsgs.push({r:"a",t:reply});S.spkBusy=false;render();
    const banner=$("spk-banner");if(banner)banner.style.display="flex";
    speak(reply,()=>{
      if($("spk-banner"))$("spk-banner").style.display="none";
      if(sttOk)autoMic(t=>{if(t)spkSend(t);});
    });
  }catch(e){S.spkMsgs.push({r:"a",t:`(Erreur réseau: ${e.message})`});S.spkBusy=false;render();}
}

async function spkEnd(){
  S.spkView="feedback";S.spkFbBusy=true;render();
  const conv=S.spkMsgs.map(m=>`${m.r==="u"?"GURBANI":"SOPHIE"}: ${m.t}`).join("\n");
  try{const d=await aiJSON(SYS_SPK_FB,`Full conversation:\n${conv}\n\nAnalyse GURBANI lines only.`);S.spkFb=d;await saveSession("speaking",d.score,S.spkTopic?.l);}
  catch(e){S.spkFb={overall:`Error: ${e.message}`,score:0,strengths:[],mistakes:[],suggestions:[],nextFocus:""};}
  S.spkFbBusy=false;render();
}

    else{S.lisView="dr";saveSession("listening",acc,"Dictation");}
    render();
  });
}

    ta.oninput=e=>{
      S.wrText=e.target.value;
      const wc=S.wrText.trim().split(/\s+/).filter(Boolean).length;
      const el=$("wr-wc");if(el){el.textContent=`${wc} / 80 mots ${wc>=80?"✓":""}`;el.style.color=wc>=80?"#2e9e7a":"#e6954a";}
      const btn=$("wr-sub");if(btn)btn.disabled=wc<20;
    };
    w.appendChild(ta);
    const row=document.createElement("div");row.style.cssText="display:flex;align-items:center;justify-content:space-between";
    const wc=S.wrText.trim().split(/\s+/).filter(Boolean).length;
    const wcel=document.createElement("span");wcel.id="wr-wc";wcel.style.cssText=`font-size:13px;color:${wc>=80?"#2e9e7a":"#e6954a"}`;wcel.textContent=`${wc} / 80 mots ${wc>=80?"✓":""}`;
    const btn=document.createElement("button");btn.id="wr-sub";btn.className="btn";btn.style.cssText="background:#c9a96e;color:#1a1a2e";btn.textContent="Get Feedback →";btn.disabled=wc<20;
    btn.onclick=()=>{S.wrText=ta.value;wrSubmit();};
    row.append(wcel,btn);w.appendChild(row);
  }
  else if(S.wrView==="feedback"){
    if(S.wrBusy){w.innerHTML=`<div class="loader"><div style="font-size:34px">✍️</div><p>Reviewing your writing…</p></div>`;}
    else if(S.wrFb)renderFeedback(w,S.wrFb,()=>{S.wrView="prompts";S.wrFb=null;render();},()=>go("home"));
  }
  body.appendChild(w);
}

async function wrSubmit(){
  S.wrBusy=true;S.wrView="feedback";render();
  try{
    const d=await aiJSON(SYS_WFB,`Writing prompt: ${S.wrPrompt.p}\n\nGurbani's response:\n${S.wrText}`);
    S.wrFb=d;await saveSession("writing",d.score,S.wrPrompt.l);
  }catch(e){S.wrFb={overall:`Error: ${e.message}`,score:0,strengths:[],mistakes:[],suggestions:[],nextFocus:""};}
  S.wrBusy=false;render();
}

// ─── FEEDBACK PANEL (shared) ───────────────────────────────────
function renderFeedback(parent,data,onRetry,onHome){
  const catC=c=>({Grammar:"#e74c6f",Vocabulary:"#7c5cbf",Spelling:"#e6954a",Structure:"#2e9e7a","Word Order":"#2e9e7a"}[c]||"#888");
  const w=document.createElement("div");w.style.cssText="max-width:640px;margin:0 auto;padding:20px 16px";
  w.innerHTML=`<div style="text-align:center;margin-bottom:16px"><div class="score-big" style="color:${sc(data.score)}">${data.score}</div><div style="font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-top:4px">out of 100</div><p style="font-size:14px;color:#555;margin-top:10px;line-height:1.7">${data.overall}</p></div>`;
  if(data.strengths?.length){const b=document.createElement("div");b.className="box-g";b.innerHTML=`<div style="font-weight:bold;color:#2e9e7a;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">✓ WHAT YOU DID WELL</div>${data.strengths.map(x=>`<div style="margin-bottom:4px;padding-left:10px;border-left:2px solid #2e9e7a">${x}</div>`).join("")}`;w.appendChild(b);}
  if(data.mistakes?.length){
    const mh=document.createElement("div");mh.style.cssText="font-size:11px;color:#e74c6f;letter-spacing:2px;text-transform:uppercase;font-weight:bold;margin-bottom:8px";mh.textContent="✗ CORRECTIONS";w.appendChild(mh);
    data.mistakes.forEach(m=>{
      const d=document.createElement("div");d.style.cssText="background:#fff;border:1px solid #ede8df;border-radius:10px;padding:12px;margin-bottom:8px";
      d.innerHTML=`<span style="background:${catC(m.category)};color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;text-transform:uppercase">${m.category}</span><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;margin-bottom:8px"><div style="background:#fff0f3;border:1px solid #ffd0da;border-radius:6px;padding:8px"><div style="font-size:10px;color:#e74c6f;text-transform:uppercase;margin-bottom:2px">You wrote</div><div style="font-size:13px;color:#c0392b;font-style:italic">"${m.original}"</div></div><div style="background:#f0fff6;border:1px solid #b8e6d0;border-radius:6px;padding:8px"><div style="font-size:10px;color:#2e9e7a;text-transform:uppercase;margin-bottom:2px">Correction</div><div style="font-size:13px;color:#1a6640;font-style:italic">"${m.correction}"</div></div></div><div style="font-size:13px;color:#666;line-height:1.5;border-top:1px solid #ede8df;padding-top:8px">${m.explanation}</div>`;
      w.appendChild(d);
    });
  }
  if(data.suggestions?.length){const b=document.createElement("div");b.className="box-p";b.innerHTML=`<div style="font-weight:bold;color:#7c5cbf;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">💡 EXPRESSIONS TO LEARN</div>${data.suggestions.map(x=>`<div style="margin-bottom:3px;padding-left:10px;border-left:2px solid #7c5cbf">${x}</div>`).join("")}`;w.appendChild(b);}
  if(data.nextFocus){const b=document.createElement("div");b.className="box-y";b.innerHTML=`<strong>🎯 Focus next time:</strong> ${data.nextFocus}`;w.appendChild(b);}
  const btns=document.createElement("div");btns.style.cssText="display:flex;gap:10px;justify-content:center;margin-top:4px";
  const b1=document.createElement("button");b1.className="btn";b1.textContent="Try Again";b1.onclick=onRetry;
  const b2=document.createElement("button");b2.className="btn-o";b2.textContent="← Home";b2.onclick=onHome;
  btns.append(b1,b2);w.appendChild(btns);
  parent.appendChild(w);
}

// ─── INIT ──────────────────────────────────────────────────────
(async()=>{
  if(S.key){S.progress=(await fbLoad())||emptyProg();}
  render();
})();
</script>
</body>
